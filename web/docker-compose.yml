services:
  web:
    build: .
    container_name: fabrica-web
    ports:
      - "8000:8000"
    volumes:
      - ../credentials.json:/app/credentials.json:ro
      - ../token.json:/app/token.json:ro
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - TOKEN_FILE=/app/token.json
    restart: unless-stopped
