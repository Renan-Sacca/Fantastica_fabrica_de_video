services:
  web:
    build: .
    container_name: fabrica-web
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ../credentials.json:/app/credentials.json:ro
      - ../token.json:/app/token.json:ro
      - ./data:/app/data
      # Pasta compartilhada com o worker OmniVoice (tts3/data): vozes e .wav gerados
      - ../tts3/data:/app/tts3_audio
    env_file:
      - .env
    environment:
      - TOKEN_FILE=/app/token.json
    restart: unless-stopped
