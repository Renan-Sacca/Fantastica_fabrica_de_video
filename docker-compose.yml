services:
  app:
    build: .
    container_name: fabrica-de-video
    ports:
      - "8000:8000"
    volumes:
      - ./conversations:/app/conversations
      - ./assets:/app/assets
      - ./output:/app/output
      - ./uploads:/app/uploads
    environment:
      - MAX_CONCURRENT_RENDERS=2
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    # Recursos opcionais para limitar uso de CPU/memória
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G
    #       cpus: '2.0'
