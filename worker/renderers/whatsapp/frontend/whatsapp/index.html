<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="whatsapp-container">

        <!-- Status Bar (topo do celular) -->
        <div class="status-bar">
            <span class="status-bar-time" id="status-bar-time">10:30</span>
            <div class="status-bar-icons">
                <!-- Signal -->
                <svg viewBox="0 0 24 24" width="16" height="16">
                    <rect x="2" y="16" width="3" height="5" rx="0.5" fill="#fff"/>
                    <rect x="7" y="12" width="3" height="9" rx="0.5" fill="#fff"/>
                    <rect x="12" y="8" width="3" height="13" rx="0.5" fill="#fff"/>
                    <rect x="17" y="4" width="3" height="17" rx="0.5" fill="#fff"/>
                </svg>
                <!-- WiFi -->
                <svg viewBox="0 0 24 24" width="16" height="16">
                    <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z" fill="#fff"/>
                </svg>
                <!-- Battery -->
                <svg viewBox="0 0 24 24" width="16" height="16">
                    <path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z" fill="#fff"/>
                </svg>
            </div>
        </div>

        <!-- Chat Header -->
        <div class="chat-header">
            <div class="header-back">
                <svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="#fff"/></svg>
            </div>
            <div class="header-avatar">
                <img id="contact-avatar" src="" alt="avatar" />
            </div>
            <div class="header-info">
                <div class="header-name" id="contact-name">Contato</div>
                <div class="header-status" id="contact-status">online</div>
            </div>
            <div class="header-actions">
                <svg viewBox="0 0 24 24" width="22" height="22"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z" fill="#fff"/></svg>
                <svg viewBox="0 0 24 24" width="22" height="22"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z" fill="#fff"/></svg>
                <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="#fff"/></svg>
            </div>
        </div>

        <!-- Área de Mensagens -->
        <div class="chat-messages" id="chat-messages">
            <div class="chat-messages-inner" id="messages-inner">
                <!-- Mensagens serão inseridas via JS -->

                <!-- Indicador de digitação -->
                <div class="typing-indicator" id="typing-indicator">
                    <div class="typing-bubble">
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Barra de Input (visual apenas) -->
        <div class="chat-input-bar">
            <div class="input-emoji-btn">
                <svg viewBox="0 0 24 24" width="26" height="26"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z" fill="#8696a0"/></svg>
            </div>
            <div class="input-field">
                <span class="input-field-text">Mensagem</span>
                <svg viewBox="0 0 24 24" width="24" height="24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z" fill="#8696a0"/></svg>
                <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 15.2c1.77 0 3.2-1.43 3.2-3.2S13.77 8.8 12 8.8 8.8 10.23 8.8 12s1.43 3.2 3.2 3.2zM9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9z" fill="#8696a0"/></svg>
            </div>
            <div class="input-mic-btn">
                <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z" fill="#fff"/></svg>
            </div>
        </div>

        <!-- Navigation bar (Android) -->
        <div class="nav-bar">
            <div class="nav-bar-pill"></div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
