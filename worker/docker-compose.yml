services:
  worker:
    build: .
    container_name: fabrica-worker
    volumes:
      - .:/app
      - ../credentials.json:/app/credentials.json:ro
      - ../token.json:/app/token.json:ro
      - ../tts3/data:/app/tts3_audio
    env_file:
      - .env
    environment:
      - TOKEN_FILE=/app/token.json
    restart: unless-stopped
